<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>G☆CHI Shop</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.9.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="./css/main.css">
</head>
<body>
    <div class="wrapper">
        <aside>
            <header><h1 class="logo">G☆CHI</h1></header>
            <nav>
                <ul class="menu">
                    <li><button class="boton-menu boton-categoria active">Todos los productos</button></li>
                    <li><button class="boton-menu boton-categoria">Pulseras</button></li>
                    <li><button class="boton-menu boton-categoria">Rosarios</button></li>
                    <li><a class="boton-menu" href="./carrito.html"><i class="bi bi-cart-fill"></i> Carrito</a></li>
                    <li><a class="boton-menu" href="profile.html">Editar Perfil</a></li>
                    <li><a href="admin.html" id="admin-link" style="display: none;">Panel Admin</a></li>
                    <li><button class="boton-menu" onclick="logout()"><i class="bi bi-people-fill"></i> Cerrar Sesión</button></li>
                </ul>
            </nav>
        </aside>

        <main>
            <h2 class="titulo-principal">Todos los productos</h2>
            <div id="contenedor-productos" class="contenedor-productos"></div>
        </main>
    </div>

    <script src="./js/main.js"></script>
    <script>
        window.onload = function() {
            const token = localStorage.getItem('token');
            const role = localStorage.getItem('role');
            
            if (!token) {
                window.location.href = 'login.html';
                return;
            }
            if (role === 'admin') {
                document.getElementById('admin-link').style.display = 'inline';
            }
        };
        
        function logout() {
            localStorage.removeItem('token');
            localStorage.removeItem('role');
            window.location.href = 'login.html';
        }
    </script>
</body>
</html>
