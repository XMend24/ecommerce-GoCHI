<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Registro - G☆CHI</title>
    <link rel="stylesheet" href="./css/main.css">
</head>
<body class="auth-body">
    <div class="auth-card">
        <h2>Crear Cuenta</h2>
        <p>Únete a la comunidad exclusiva de G☆CHI.</p>
        
        <form id="register-form">
            <div class="input-group">
                <label>Nombre Completo</label>
                <input type="text" id="nombre-reg" placeholder="Juan Pérez" required>
            </div>
            <div class="input-group">
                <label>Correo Electrónico</label>
                <input type="email" id="email-reg" placeholder="tu@correo.com" required>
            </div>
            <div class="input-group">
                <label>Contraseña</label>
                <input type="password" id="password-reg" placeholder="Mínimo 8 caracteres" required>
            </div>
            <button type="submit" class="btn-auth" style="background-color: var(--gold-accent);">Registrarme</button>
        </form>
        <script src="/js/login.js"></script>
        <p style="margin-top: 20px;"><a href="login.html" style="color: #7f8c8d;">Ya tengo cuenta</a></p>
    </div>
</body>
</html>
