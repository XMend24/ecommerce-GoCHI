<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Panel Admin - G☆CHI</title>
    <link rel="stylesheet" href="./css/main.css">
</head>
<body>
    <div class="wrapper">
        <main>
            <h2 class="titulo-principal">Subir Nuevo Producto</h2>
            <form id="form-producto" class="form-container">
                <input type="text" id="nombre" placeholder="Nombre del producto" required>
                <input type="number" id="precio" placeholder="Precio" step="0.01" required>
                <textarea id="descripcion" placeholder="Descripción"></textarea>
                <input type="text" id="imagen_url" placeholder="URL de la imagen">
                <select id="categoria">
                    <option value="pulseras">Pulseras</option>
                    <option value="rosarios">Rosarios</option>
                </select>
                <button type="submit" class="boton-menu">Publicar Producto</button>
                <a href="index.html">Volver a la tienda</a>
            </form>
        </main>
    </div>
    <script src="./js/admin.js"></script>
</body>
</html>
