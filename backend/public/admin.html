<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Panel Admin - G☆CHI</title>
    <link rel="stylesheet" href="./css/main.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
</head>
<body>
    
    <div class="admin-main-container" style="display: flex; gap: 30px; align-items: flex-start; flex-wrap: wrap;">
        
        <form id="form-producto" class="form-container" style="flex: 1; min-width: 350px;">
            <h2 class="titulo-principal"><i class="bi bi-box-seam"></i> Nuevo Producto</h2>
            
            <input type="text" id="nombre" placeholder="Nombre del producto" required>
            
            <input type="number" id="precio" placeholder="Precio (ej: 15.50)" step="0.01" required>
            
            <textarea id="descripcion" placeholder="Escribe una breve descripción..." rows="3"></textarea>
            
            <input type="text" id="imagen_url" placeholder="URL de la imagen (PostImages/Imgur)">
            
            <select id="categoria">
                <option value="" disabled selected>Selecciona una categoría</option>
                <option value="pulseras">Pulseras</option>
                <option value="rosarios">Rosarios</option>
            </select>
            
            <button type="submit" id="btn-guardar" class="boton-publicar">
                Publicar Producto
            </button>
            
            <a href="index.html" class="link-volver">
                <i class="bi bi-arrow-left"></i> Volver a la tienda
            </a>
        </form>
        <div class="bitacora-wrapper" style="flex: 1; min-width: 400px;">
            <div class="bitacora-container">
                <h3><i class="bi bi-journal-text"></i> Movimientos Recientes</h3>
                <div id="tabla-bitacora">
                <p>Cargando registros...</p>
                </div>
            </div>
        </div>
    </div>

    <script src="./js/admin.js"></script>
</body>
</html>
