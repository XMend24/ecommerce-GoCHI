<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>G☆CHI Shop</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.9.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="./css/main.css">
</head>
<body>
    <div class="wrapper">
        <aside>
            <header><h1 class="logo">G☆CHI</h1></header>
            <nav>
                <ul class="menu">
                    <li><button class="boton-menu boton-categoria active">Todos los productos</button></li>
                    <li><button class="boton-menu boton-categoria">Pulseras</button></li>
                    <li><button class="boton-menu boton-categoria">Rosarios</button></li>
                    <li><a class="boton-menu" href="./carrito.html"><i class="bi bi-cart-fill"></i> Carrito</a></li>
                    <div class="user-menu-container">
    <button id="user-menu-btn" class="boton-menu user-btn">
        <i class="bi bi-person-circle"></i>
        <span id="user-name-display">Cargando...</span>
        <i class="bi bi-chevron-up"></i>
    </button>

    <div id="user-menu-dropdown" class="user-menu-content">
        <a href="profile.html" class="menu-item">
            <i class="bi bi-person-gear"></i> Editar Perfil
        </a>
        
        <a href="admin.html" id="admin-link" class="menu-item admin-only">
            <i class="bi bi-shield-lock"></i> Panel Admin
        </a>
        
        <div class="menu-divider"></div>
        
        <button id="cerrar-sesion-btn" class="menu-item logout-item">
            <i class="bi bi-box-arrow-right"></i> Cerrar Sesión
        </button>
    </div>
</div>
                </ul>
            </nav>
        </aside>

        <main>
            <h2 class="titulo-principal">Todos los productos</h2>
            <div id="contenedor-productos" class="contenedor-productos"></div>
        </main>
    </div>

    <script src="./js/main.js"></script>
    <script>
    window.onload = function() {
        const token = localStorage.getItem('token');
        const role = localStorage.getItem('role');
        
        if (!token) {
            window.location.href = 'login.html';
            return;
        }

        if (role === 'admin') {
            document.getElementById('admin-link').style.display = 'inline';
        }

        if (typeof cargarProductosDesdeBD === "function") {
            cargarProductosDesdeBD();
        }
    };
    
    function logout() {
        localStorage.removeItem('token');
        localStorage.removeItem('role');
        window.location.href = 'login.html';
    }
</script>
</body>
</html>
